name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - run: uv python install 3.13

      - run: uv sync --frozen --group build

      - run: uv run python3 setup_app.py py2app

      - run: |
          if [[ -d dist/main.app && ! -d dist/usag.app ]]; then
            mv dist/main.app dist/usag.app
          fi
          cd dist && zip -r usag.app.zip usag.app

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/usag.app.zip
